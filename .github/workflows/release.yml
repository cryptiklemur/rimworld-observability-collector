name: release

on:
  push:
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install release dependencies
        run: npm install

      - name: pnpm install (dashboard)
        working-directory: RimObs.Dashboard
        run: pnpm install --no-frozen-lockfile

      - name: Build dashboard
        working-directory: RimObs.Dashboard
        run: pnpm build

      - name: dotnet restore
        run: dotnet restore RimObs.sln

      - name: dotnet build
        run: dotnet build RimObs.sln -c Release --nologo --no-restore

      - name: dotnet test
        run: dotnet test RimObs.sln -c Release --nologo --no-build --logger "console;verbosity=normal"

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Set up SteamCMD
        uses: buildalon/setup-steamcmd@v1

      - name: Restore Steam config
        env:
          STEAM_CONFIG_VDF_B64: ${{ secrets.STEAM_CONFIG_VDF_B64 }}
        run: |
          mkdir -p "$STEAM_DIR/config"
          printf '%s' "$STEAM_CONFIG_VDF_B64" | base64 -d > "$STEAM_DIR/config/config.vdf"
          echo "STEAM_CONFIG_VDF=$STEAM_DIR/config/config.vdf" >> "$GITHUB_ENV"

      - name: Steam login preflight
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          "$STEAM_CMD/steamcmd.sh" +@ShutdownOnFailedCommand 1 +@NoPromptForPassword 1 +login "$STEAM_USERNAME" +quit

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_CONFIG_VDF: ${{ env.STEAM_CONFIG_VDF }}
          STEAMCMD_PATH: ${{ env.STEAM_CMD }}/steamcmd.sh
        run: npx semantic-release
